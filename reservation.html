  <main class="mx-auto max-w-4xl px-4 py-16">
    <h1 class="text-4xl font-semibold text-white">Reservation</h1>
    <p class="mt-3 text-zinc-300">Reserve a table for coffee meetings, brunch, or evening conversations.</p>

    <form data-reservation-form novalidate class="mt-10 grid gap-5 rounded-xl border border-wolfGold/25 bg-wolfGray p-7">
      <label class="text-sm font-medium text-zinc-300">Name
        <input type="text" name="name" required class="mt-2 w-full rounded-md border border-zinc-700 bg-wolfSlate px-4 py-3 text-zinc-100 outline-none ring-wolfGold/50 placeholder:text-zinc-500 focus:ring" />
        <span class="field-error" data-error-for="name"></span>
      </label>
      <label class="text-sm font-medium text-zinc-300">Phone
        <input type="tel" name="phone" required placeholder="+1 555 123 4567" class="mt-2 w-full rounded-md border border-zinc-700 bg-wolfSlate px-4 py-3 text-zinc-100 outline-none ring-wolfGold/50 placeholder:text-zinc-500 focus:ring" />
        <span class="field-error" data-error-for="phone"></span>
      </label>
      <div class="grid gap-5 md:grid-cols-3">
        <label class="text-sm font-medium text-zinc-300">Date
          <input type="date" name="date" required class="mt-2 w-full rounded-md border border-zinc-700 bg-wolfSlate px-4 py-3 text-zinc-100 outline-none ring-wolfGold/50 focus:ring" />
          <span class="field-error" data-error-for="date"></span>
        </label>
        <label class="text-sm font-medium text-zinc-300">Time
          <input type="time" name="time" required class="mt-2 w-full rounded-md border border-zinc-700 bg-wolfSlate px-4 py-3 text-zinc-100 outline-none ring-wolfGold/50 focus:ring" />
          <span class="field-error" data-error-for="time"></span>
        </label>
        <label class="text-sm font-medium text-zinc-300">Number of guests
          <input type="number" min="1" max="12" value="2" name="guests" required class="mt-2 w-full rounded-md border border-zinc-700 bg-wolfSlate px-4 py-3 text-zinc-100 outline-none ring-wolfGold/50 focus:ring" />
          <span class="field-error" data-error-for="guests"></span>
        </label>
      </div>
      <label class="text-sm font-medium text-zinc-300">Message
        <textarea name="message" rows="4" class="mt-2 w-full rounded-md border border-zinc-700 bg-wolfSlate px-4 py-3 text-zinc-100 outline-none ring-wolfGold/50 placeholder:text-zinc-500 focus:ring" placeholder="Tell us any seating or occasion preferences"></textarea>
        <span class="field-error" data-error-for="message"></span>
      </label>
      <p class="hidden rounded-md border border-emerald-400/40 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-300" data-reservation-status></p>
      <button type="submit" class="rounded-md bg-wolfGold px-6 py-3 font-medium text-black transition hover:bg-yellow-300">Request Reservation</button>
    </form>
  </main>
